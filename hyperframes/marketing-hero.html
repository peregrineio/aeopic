<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0A0A0A;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #stage {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: linear-gradient(135deg, #0A0A0A 0%, #0F1226 100%);
    }

    /* Grid background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: #10B981;
      top: -200px;
      right: -100px;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: #726AFF;
      bottom: -100px;
      left: 20%;
    }

    /* Metrics container */
    .metrics-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 80px;
    }

    /* Metric card */
    .metric {
      text-align: center;
      opacity: 0;
    }

    .metric-value {
      font-size: 140px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .metric-value .accent {
      color: #10B981;
    }

    .metric-label {
      font-size: 24px;
      color: rgba(255,255,255,0.5);
      margin-top: 16px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* Chart */
    .chart-container {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 1200px;
      height: 200px;
    }

    .chart-line {
      fill: none;
      stroke: #10B981;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
    }

    .chart-fill {
      fill: url(#chartGradient);
      opacity: 0;
    }

    /* Floating elements */
    .floating-stat {
      position: absolute;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px 30px;
      opacity: 0;
    }

    .floating-stat .value {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
    }

    .floating-stat .label {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    .stat-1 { top: 15%; left: 10%; }
    .stat-2 { top: 25%; right: 15%; }
    .stat-3 { bottom: 35%; left: 15%; }
    .stat-4 { bottom: 30%; right: 10%; }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drawLine {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.1); opacity: 0.6; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    /* Animation triggers */
    .metric-1 {
      animation: fadeInUp 0.8s ease-out 0.5s forwards;
    }
    .metric-2 {
      animation: fadeInUp 0.8s ease-out 0.8s forwards;
    }
    .metric-3 {
      animation: fadeInUp 0.8s ease-out 1.1s forwards;
    }

    .chart-line {
      animation: drawLine 2s ease-out 1.5s forwards;
    }

    .chart-fill {
      animation: fadeIn 1s ease-out 2.5s forwards;
    }

    .stat-1 {
      animation: fadeInUp 0.6s ease-out 2s forwards, float 4s ease-in-out 3s infinite;
    }
    .stat-2 {
      animation: fadeInUp 0.6s ease-out 2.2s forwards, float 4s ease-in-out 3.5s infinite;
    }
    .stat-3 {
      animation: fadeInUp 0.6s ease-out 2.4s forwards, float 4s ease-in-out 4s infinite;
    }
    .stat-4 {
      animation: fadeInUp 0.6s ease-out 2.6s forwards, float 4s ease-in-out 4.5s infinite;
    }

    .orb-1 {
      animation: pulse 6s ease-in-out infinite;
    }
    .orb-2 {
      animation: pulse 6s ease-in-out 2s infinite;
    }
  </style>
</head>
<body>
  <div id="stage"
       data-composition-id="marketing-hero"
       data-width="1920"
       data-height="1080"
       data-fps="30"
       data-duration="10">

    <!-- Background -->
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Main metrics -->
    <div class="metrics-container">
      <div class="metric metric-1">
        <div class="metric-value"><span class="accent">+</span>247%</div>
        <div class="metric-label">Traffic Growth</div>
      </div>
      <div class="metric metric-2">
        <div class="metric-value">3.2<span class="accent">x</span></div>
        <div class="metric-label">Return on Ad Spend</div>
      </div>
      <div class="metric metric-3">
        <div class="metric-value"><span class="accent">#</span>1</div>
        <div class="metric-label">Local Rankings</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <svg width="1200" height="200" viewBox="0 0 1200 200">
        <defs>
          <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#10B981" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <!-- Chart fill area -->
        <path class="chart-fill" d="M 0 180 Q 150 170, 300 150 T 600 100 T 900 60 T 1200 20 L 1200 200 L 0 200 Z"/>
        <!-- Chart line -->
        <path class="chart-line" d="M 0 180 Q 150 170, 300 150 T 600 100 T 900 60 T 1200 20"/>
      </svg>
    </div>

    <!-- Floating stats -->
    <div class="floating-stat stat-1">
      <div class="value">+64%</div>
      <div class="label">Organic Traffic</div>
    </div>
    <div class="floating-stat stat-2">
      <div class="value">847</div>
      <div class="label">Leads Generated</div>
    </div>
    <div class="floating-stat stat-3">
      <div class="value">12</div>
      <div class="label">Keywords Ranking</div>
    </div>
    <div class="floating-stat stat-4">
      <div class="value">4.8★</div>
      <div class="label">Review Score</div>
    </div>

  </div>
</body>
</html>
